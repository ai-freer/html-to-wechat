<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="pragma" content="no-cache" />
  <meta http-equiv="expires" content="0" />
  <title>HTML → 口播稿 Markdown · HTML-to-WeChat</title>
  <meta name="description" content="把长 HTML 文章改写成 AI 视频生成软件可直接喂的口播稿——短句、口语化、按节奏切段，输出 .md 文件。" />
  <link rel="stylesheet" href="./styles.css?v=1" />
</head>
<body data-state="empty">
  <header class="topbar">
    <a class="back" href="../" title="返回首页">
      <span class="back-arrow">←</span>
      <span class="logo-mark">⌬</span>
    </a>
    <div class="brand">
      <div class="brand-row">
        <span class="brand-num">03</span>
        <strong>HTML → 口播稿 Markdown</strong>
      </div>
      <span class="brand-sub muted small">短句 · 口语化 · 按节奏切段 · 输出 .md</span>
    </div>
    <div class="actions">
      <button id="btn-sample" type="button" class="ghost">载入示例</button>
      <label class="ghost" for="file-input">上传 .md</label>
      <input id="file-input" type="file" accept=".md,.txt,.markdown,text/markdown,text/plain" hidden />
      <button id="btn-clear" type="button" class="ghost">清空</button>
    </div>
  </header>

  <main class="split">
    <section class="pane editor-pane">
      <div class="pane-head">
        <span class="pane-title"><span class="pane-num">1</span>口播稿 Markdown 源</span>
        <span id="src-hint" class="muted small">支持 fragment 传入：<code>#payload=&lt;base64-md&gt;</code></span>
      </div>
      <textarea id="src" spellcheck="false" placeholder="粘贴 LLM 改写后的口播稿 Markdown，或点击 [载入示例] 看效果。"></textarea>
    </section>

    <section class="pane preview-pane">
      <div class="pane-head">
        <span class="pane-title"><span class="pane-num">2</span>预览 · 元信息</span>
        <div class="actions-inline">
          <button id="btn-copy" type="button" class="primary-sm" disabled>复制纯文本</button>
          <button id="btn-download-md" type="button" class="ghost" disabled>下载 .md</button>
          <button id="btn-download-txt" type="button" class="ghost" disabled>下载 .txt</button>
        </div>
      </div>
      <div id="preview" class="preview" aria-live="polite"></div>
    </section>
  </main>

  <footer class="meta-bar" aria-label="元信息">
    <div class="meta-cell">
      <span class="meta-num" id="m-chars">0</span>
      <span class="meta-label">字数</span>
    </div>
    <div class="meta-cell">
      <span class="meta-num" id="m-duration">0:00</span>
      <span class="meta-label">估时（250 字/分）</span>
    </div>
    <div class="meta-cell">
      <span class="meta-num" id="m-sections">0</span>
      <span class="meta-label">段落（## 分）</span>
    </div>
    <div class="meta-cell">
      <span class="meta-num" id="m-sentences">0</span>
      <span class="meta-label">句子</span>
    </div>
    <div class="meta-cell">
      <span class="meta-num" id="m-avg">0</span>
      <span class="meta-label">平均句长</span>
    </div>
    <div class="meta-cell meta-cell-expand">
      <span id="m-warnings" class="muted small"></span>
    </div>
  </footer>

  <script type="module" src="./app.mjs?v=1"></script>
</body>
</html>
