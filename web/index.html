<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>html-to-wechat · 把 HTML artifact 投递到公众号、小红书、AI 视频</title>
  <meta name="description" content="把 agent 生成的 HTML artifact 文章投递到公众号、小红书、AI 视频生成软件。模式 1：CSS 内联、清理后复制为富文本，粘贴到公众号后台即可保留样式。" />
  <meta property="og:title" content="html-to-wechat" />
  <meta property="og:description" content="把 agent 生成的 HTML artifact 投递到公众号、小红书、AI 视频" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <strong>html-to-wechat</strong>
      <span class="brand-sub muted small">把 agent 生成的 HTML artifact 投递到公众号、小红书、AI 视频</span>
    </div>
    <nav class="modes-nav" aria-label="模式切换">
      <a class="mode-tab active" href="./" aria-current="page">公众号富文本</a>
      <a class="mode-tab" href="./images/">图集 <span class="tab-badge">规划中</span></a>
      <a class="mode-tab" href="./script/">口播稿 <span class="tab-badge">规划中</span></a>
    </nav>
    <div class="actions">
      <button id="btn-sample" type="button" class="ghost">载入示例</button>
      <label class="ghost" for="file-input">上传 .html</label>
      <input id="file-input" type="file" accept=".html,.htm,text/html" hidden />
      <button id="btn-clear" type="button" class="ghost">清空</button>
      <a class="ghost github-link" href="https://github.com/ai-freer/html-to-wechat" target="_blank" rel="noopener" title="GitHub 仓库">GitHub</a>
    </div>
  </header>

  <main class="split">
    <section class="pane editor-pane">
      <div class="pane-head">
        <span class="pane-title">输入 HTML</span>
        <span class="muted small" id="input-stats">0 字符</span>
      </div>
      <textarea id="editor" spellcheck="false" placeholder="在此粘贴完整的 HTML 文档，或上传 .html 文件。&#10;&#10;包含 <style>、<script>、SVG 内联都可以——会自动 CSS 内联、删除 script、清理公众号不支持的属性。"></textarea>
    </section>

    <section class="pane preview-pane">
      <div class="pane-head">
        <span class="pane-title">预览（公众号视角）</span>
        <span class="muted small" id="output-stats"></span>
      </div>
      <iframe id="preview" sandbox="allow-same-origin" title="预览"></iframe>
    </section>
  </main>

  <footer class="bottom-bar">
    <div class="status" id="status">等待输入…</div>
    <div class="warnings" id="warnings"></div>
    <button id="btn-copy" type="button" class="primary" disabled>复制为富文本</button>
  </footer>

  <div id="toast" class="toast" hidden></div>

  <script type="module" src="./app.js"></script>

</body>
</html>
