<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HTML → 公众号富文本 · HTML-to-WeChat</title>
  <meta name="description" content="CSS 内联、清理后复制为富文本，粘贴到公众号后台即可保留样式。" />
  <link rel="stylesheet" href="./styles.css?v=5" />
</head>
<body data-step="1">
  <header class="topbar">
    <a class="back" href="../" title="返回首页">
      <span class="back-arrow">←</span>
      <span class="logo-mark">⌬</span>
    </a>
    <div class="brand">
      <div class="brand-row">
        <span class="brand-num">01</span>
        <strong>HTML → 公众号富文本</strong>
      </div>
      <span class="brand-sub muted small">CSS 内联 · 清理脚本 · 一键复制富文本</span>
    </div>
    <ol class="steps" aria-label="工作流程">
      <li data-step="1"><span class="step-dot">1</span><span class="step-label">输入</span></li>
      <li class="step-sep" aria-hidden="true"></li>
      <li data-step="2"><span class="step-dot">2</span><span class="step-label">预览</span></li>
      <li class="step-sep" aria-hidden="true"></li>
      <li data-step="3"><span class="step-dot">3</span><span class="step-label">复制</span></li>
    </ol>
    <div class="actions">
      <div class="url-wrap">
        <button id="btn-url" type="button" class="ghost" aria-haspopup="dialog" aria-expanded="false">从 URL</button>
        <div id="url-popover" class="url-popover" role="dialog" aria-label="从 URL 拉取 HTML" hidden>
          <input id="url-input" type="url" placeholder="https://example.com/article.html" autocomplete="off" spellcheck="false" />
          <button id="btn-url-fetch" type="button" class="primary-sm">获取</button>
          <p class="url-hint muted small">优先直接拉取；遇到 CORS 自动改走 <code>corsproxy.io</code>。</p>
        </div>
      </div>
      <button id="btn-sample" type="button" class="ghost">载入示例</button>
      <label class="ghost" for="file-input">上传 .html</label>
      <input id="file-input" type="file" accept=".html,.htm,text/html" hidden />
      <button id="btn-clear" type="button" class="ghost">清空</button>
    </div>
  </header>

  <main class="split">
    <section class="pane editor-pane">
      <div class="pane-head">
        <span class="pane-title"><span class="pane-num">1</span>输入 HTML</span>
        <div class="pane-options">
          <label class="toggle" title="自动提取 <article>/<main>，剥离导航 / 页脚 / 侧边栏">
            <input type="checkbox" id="opt-extract-main" checked />
            <span>仅保留正文</span>
          </label>
          <span class="muted small" id="input-stats">0 字符</span>
        </div>
      </div>
      <textarea id="editor" spellcheck="false" placeholder="在此粘贴完整的 HTML 文档，或上传 .html 文件。&#10;&#10;包含 <style>、<script>、SVG 内联都可以——会自动 CSS 内联、删除 script、清理公众号不支持的属性。&#10;&#10;不知道从哪开始？点击右上角「载入示例」。"></textarea>
    </section>

    <section class="pane preview-pane">
      <div class="pane-head">
        <span class="pane-title"><span class="pane-num">2</span>预览（公众号视角）</span>
        <span class="muted small" id="output-stats"></span>
      </div>
      <iframe id="preview" sandbox="allow-same-origin" title="预览"></iframe>
    </section>
  </main>

  <footer class="bottom-bar">
    <div class="status" id="status">等待输入…</div>
    <div class="warnings" id="warnings"></div>
    <button id="btn-copy" type="button" class="primary" disabled>
      <span class="primary-num">3</span>
      <span>复制为富文本</span>
    </button>
  </footer>

  <div id="toast" class="toast" hidden></div>

  <script type="module" src="./app.js?v=5"></script>

</body>
</html>
